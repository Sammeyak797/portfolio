<section class="exp-wrap" id="experience">
  <div class="exp-inner">
    <div class="section-label">
      <span class="line"></span>
      <span class="label-text">Experience</span>
    </div>

    <h2 class="section-heading">Where I've worked</h2>

    <div class="timeline">
      <div class="timeline-item" *ngFor="let exp of experiences">
        <div class="timeline-left">
          <div class="timeline-dot" [class.active]="exp.current"></div>
          <div class="timeline-line" *ngIf="experiences.length > 1"></div>
        </div>

        <div class="exp-card">
          <div class="exp-card-top">
            <div class="exp-meta">
              <div class="exp-role-row">
                <h3 class="exp-role">{{ exp.role }}</h3>
                <span class="exp-badge" *ngIf="exp.current">Current</span>
              </div>
              <div class="exp-company-row">
                <span class="exp-company">{{ exp.company }}</span>
                <span class="exp-dot">·</span>
                <span class="exp-type">{{ exp.type }}</span>
              </div>
              <div class="exp-info-row">
                <span class="exp-info"> <i class="ti ti-map-pin"></i> {{ exp.location }} </span>
                <span class="exp-info"> <i class="ti ti-calendar"></i> {{ exp.period }} </span>
              </div>
            </div>
          </div>

          <ul class="exp-points">
            <li *ngFor="let point of exp.points">
              <span class="point-dot"></span>
              {{ point }}
            </li>
          </ul>

          <div class="exp-stack">
            <span class="stack-tag" *ngFor="let tech of exp.stack">{{ tech }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
