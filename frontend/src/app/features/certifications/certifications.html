<section class="cert-wrap" id="certifications">
  <div class="cert-inner">
    <div class="section-label">
      <span class="line"></span>
      <span class="label-text">Certifications</span>
    </div>

    <h2 class="section-heading">Credentials</h2>

    <div class="cert-grid">
      <div class="cert-card" *ngFor="let cert of certifications">
        <div class="cert-left">
          <div class="cert-icon">
            <i class="ti {{ cert.icon }}"></i>
          </div>
        </div>
        <div class="cert-info">
          <h3 class="cert-title">{{ cert.title }}</h3>
          <div class="cert-meta">
            <span class="cert-issuer">{{ cert.issuer }}</span>
            <span class="cert-dot">·</span>
            <span class="cert-year">{{ cert.year }}</span>
          </div>
        </div>
        <a [href]="cert.verifyUrl" target="_blank" class="cert-verify">
          <i class="ti ti-external-link"></i>
          Verify
        </a>
      </div>
    </div>
  </div>
</section>
